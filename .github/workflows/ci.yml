name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: shop_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build
        run: ./gradlew build -x test

      - name: Run Unit Tests
        run: ./gradlew test --tests "com.shop.unit.*"

      - name: Run Integration Tests
        run: ./gradlew test --tests "com.shop.integration.*"
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/shop_test
          PGUSER: test
          PGPASSWORD: test

      - name: Build Fat JAR
        run: ./gradlew buildFatJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-service
          path: build/libs/shop-service.jar

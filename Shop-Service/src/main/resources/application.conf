ktor {
    deployment {
        port = 5000
        port = ${?PORT}
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/shop"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?PGUSER}
    password = ""
    password = ${?PGPASSWORD}
}

jwt {
    secret = "shop-service-jwt-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "shop-service"
    audience = "shop-service-api"
    realm = "shop-service"
    expiration = 3600000
}

redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    ttl = 300
}

rabbitmq {
    host = "localhost"
    host = ${?RABBITMQ_HOST}
    port = 5672
    port = ${?RABBITMQ_PORT}
    username = "guest"
    username = ${?RABBITMQ_USER}
    password = "guest"
    password = ${?RABBITMQ_PASSWORD}
    queue = "order_events"
    enabled = false
    enabled = ${?RABBITMQ_ENABLED}
}

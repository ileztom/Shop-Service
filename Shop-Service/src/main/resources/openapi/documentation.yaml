openapi: 3.0.3
info:
  title: Shop Service API
  version: 1.0.0
  description: |
    REST API for an online shop service.
    Features: JWT auth, products, orders, admin stats, Redis cache, RabbitMQ.
  contact:
    name: Shop Service Team
    email: admin@shop-service.com

servers:
  - url: /
    description: Shop Service API

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 6
          example: secret123
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: john@example.com
        password:
          type: string
          example: secret123
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserDTO'
    UserDTO:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
    ProductDTO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
    CreateProductRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: Laptop
        description:
          type: string
          example: High-performance laptop
        price:
          type: number
          example: 999.99
        stock:
          type: integer
          example: 50
    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        stock:
          type: integer
    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
    OrderItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
    OrderDTO:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDTO'
        createdAt:
          type: string
    OrderItemDTO:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        priceAtOrder:
          type: number
    OrderStatsDTO:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        ordersByStatus:
          type: object
          additionalProperties:
            type: integer
        topProducts:
          type: array
          items:
            $ref: '#/components/schemas/TopProductDTO'
    TopProductDTO:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalQuantity:
          type: integer
        totalRevenue:
          type: number
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Creates a new user account and returns JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      description: Authenticates user and returns JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products:
    get:
      tags: [Products]
      summary: Get all products
      description: Returns a list of all available products. Cached in Redis.
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductDTO'
    post:
      tags: [Products (Admin)]
      summary: Create product (Admin only)
      description: Creates a new product. Requires ADMIN role.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      description: Returns a single product by ID. Cached in Redis.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '404':
          description: Product not found
    put:
      tags: [Products (Admin)]
      summary: Update product (Admin only)
      description: Updates product data. Requires ADMIN role. Clears Redis cache.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDTO'
        '403':
          description: Admin access required
        '404':
          description: Product not found
    delete:
      tags: [Products (Admin)]
      summary: Delete product (Admin only)
      description: Deletes a product. Requires ADMIN role.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Product deleted
        '403':
          description: Admin access required
        '404':
          description: Product not found

  /orders:
    post:
      tags: [Orders]
      summary: Create order
      description: |
        Creates a new order. Validates stock, decreases product quantities,
        writes audit log, sends event to RabbitMQ, caches order in Redis.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '400':
          description: Invalid order data
        '409':
          description: Insufficient stock
    get:
      tags: [Orders]
      summary: Get user orders
      description: Returns order history for the authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of user orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDTO'

  /orders/{id}:
    delete:
      tags: [Orders]
      summary: Cancel order
      description: Cancels an order and restores product stock
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDTO'
        '403':
          description: Not your order
        '404':
          description: Order not found

  /stats/orders:
    get:
      tags: [Statistics (Admin)]
      summary: Get order statistics (Admin only)
      description: Returns total orders, revenue, orders by status, and top products
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Order statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatsDTO'
        '403':
          description: Admin access required
